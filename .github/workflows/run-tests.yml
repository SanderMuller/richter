name: run-tests

permissions:
  contents: read

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml'
      - 'composer.json'
      - 'composer.lock'
      - 'testbench.yaml'
      - 'workbench/**'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml'
      - 'composer.json'
      - 'composer.lock'
      - 'testbench.yaml'
      - 'workbench/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor — lowest supported combo (prefer-lowest)
          - { php: '8.4', laravel: '12.*', testbench: '10.*', stability: prefer-lowest }
          # Ceiling — highest supported combo
          - { php: '8.5', laravel: '13.*', testbench: '11.*', stability: prefer-stable }
          # Mid Laravel on PHP-ceiling
          - { php: '8.5', laravel: '12.*', testbench: '10.*', stability: prefer-stable }
          # PHP-axis sanity: PHP 8.4 against highest Laravel + prefer-stable
          - { php: '8.4', laravel: '13.*', testbench: '11.*', stability: prefer-stable }
          # Stability-axis sanity: prefer-lowest at the ceiling
          - { php: '8.5', laravel: '13.*', testbench: '11.*', stability: prefer-lowest }

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-P${{ matrix.php }}-L${{ matrix.laravel }}-${{ matrix.stability }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-P${{ matrix.php }}-L${{ matrix.laravel }}-${{ matrix.stability }}-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/phpunit

  test-without-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: P8.4 - L12.* - without laravel/mcp

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-P8.4-L12.*-prefer-stable-nomcp-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-P8.4-L12.*-prefer-stable-nomcp-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: |
          # laravel/boost hard-requires laravel/mcp, so both must go to actually exclude mcp.
          # --no-scripts skips the post-autoload-dump skeleton scripts, which fatal on
          # testbench.yaml's BoostServiceProvider entry once boost is gone; the PHPUnit run never
          # reads testbench.yaml (TestCase::getPackageProviders() declares providers explicitly).
          composer require "laravel/framework:12.*" "orchestra/testbench:10.*" --no-interaction --no-update
          composer remove laravel/mcp laravel/boost --dev --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction --no-scripts

      - name: Execute tests
        run: vendor/bin/phpunit --exclude-group requires-mcp
